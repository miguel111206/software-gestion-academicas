services:
  db:
    image: mysql:8.4
    container_name: gestion-academica-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: gestionrendimiento
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: gestion-academica-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:123456789@db:3306/gestionrendimiento
      BACKEND_CORS_ORIGINS: http://localhost:5723,http://127.0.0.1:5723
      SECRET_KEY: dev-secret-key
    ports:
      - "8002:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: gestion-academica-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8002/api
    ports:
      - "5723:5723"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules:
